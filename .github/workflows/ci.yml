name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
            mobile/package-lock.json
            firebase/functions/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Verify launch config
        run: npm run verify:launch-config

      - name: Verify GoogleService-Info plist parity
        run: diff -q mobile/GoogleService-Info.plist mobile/ios/GoDoggyDate/GoogleService-Info.plist

      - name: Install web deps
        run: npm ci
        working-directory: web

      - name: Build web
        run: npm run build
        working-directory: web
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.example.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: godoggydate-ci
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: godoggydate-ci.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:ci
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.mapbox_ci_placeholder
          NEXT_PUBLIC_APP_URL: https://ci.example.com
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          FIREBASE_PROJECT_ID: godoggydate-ci
          FIREBASE_CLIENT_EMAIL: firebase-adminsdk-ci@example.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\\nci\\n-----END PRIVATE KEY-----\\n"

      - name: Lint web
        run: npm run lint
        working-directory: web

      - name: Typecheck web
        run: npx tsc --noEmit
        working-directory: web

      - name: Install mobile deps
        run: npm ci
        working-directory: mobile

      - name: Lint mobile
        run: npm run lint
        working-directory: mobile

      - name: Typecheck mobile
        run: npm run typecheck
        working-directory: mobile
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.example.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: godoggydate-ci
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: godoggydate-ci.appspot.com
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          EXPO_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:ci
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          EXPO_PUBLIC_PAYMENTS_API_URL: https://ci.example.com
          EXPO_PUBLIC_WEB_URL: https://ci.example.com
          EXPO_PUBLIC_EAS_PROJECT_ID: ci-eas-project-id

      - name: Install functions deps
        run: npm ci
        working-directory: firebase/functions

      - name: Build functions
        run: npm run build
        working-directory: firebase/functions
